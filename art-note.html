<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="美術ノート">
<meta name="mobile-web-app-capable" content="yes">
<title>私の美術ノート</title>
<style>
  :root {
    --bg: #f5f0e8;
    --dark: #2c2416;
    --mid: #8b6914;
    --soft: #ede8de;
    --border: #d4c9b0;
    --text: #3a2e1e;
    --muted: #8b7355;
    --white: #faf8f3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Georgia', 'Hiragino Mincho ProN', serif; background: var(--bg); color: var(--dark); min-height: 100vh; padding-bottom: 80px; }

  /* Header */
  .header { background: var(--dark); color: var(--bg); padding: 48px 20px 18px; text-align: center; position: sticky; top: 0; z-index: 100; }
  .header-sub { font-size: 9px; letter-spacing: 4px; opacity: 0.5; margin-bottom: 4px; text-transform: uppercase; }
  .header-title { font-size: 22px; font-weight: bold; letter-spacing: 1px; }

  /* Search */
  .search-wrap { padding: 10px 16px; background: var(--soft); border-bottom: 1px solid var(--border); position: sticky; top: 84px; z-index: 99; }
  .search-wrap input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--white); font-size: 13px; font-family: inherit; outline: none; color: var(--dark); }

  /* Tabs */
  .tabs { display: flex; background: var(--soft); border-bottom: 2px solid var(--border); position: sticky; top: 134px; z-index: 98; }
  .tab { flex: 1; padding: 10px 2px 8px; border: none; background: transparent; font-size: 10px; font-family: inherit; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; line-height: 1.4; }
  .tab.active { color: var(--mid); border-bottom-color: var(--mid); font-weight: bold; background: var(--bg); }

  /* Content */
  .content { padding: 14px 14px 0; max-width: 600px; margin: 0 auto; }

  /* Timeline */
  .tl-item { display: flex; margin-bottom: 4px; }
  .tl-bar { width: 3px; border-radius: 2px; margin-right: 10px; flex-shrink: 0; min-height: 100%; }
  .tl-card { flex: 1; background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 4px; }
  .tl-head { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .tl-period { font-size: 9px; color: var(--muted); display: block; margin-bottom: 2px; }
  .tl-name { font-size: 15px; font-weight: bold; }
  .tl-en { font-size: 10px; color: var(--muted); margin-left: 6px; }
  .tl-arrow { font-size: 12px; flex-shrink: 0; margin-left: 8px; }
  .tl-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
  .tl-body { padding: 0 14px 14px; border-top: 1px dotted var(--border); }
  .tl-summary { font-size: 13px; line-height: 1.75; color: var(--text); margin: 10px 0; }
  .tl-event { font-size: 11px; background: #fff8e1; padding: 6px 10px; border-radius: 6px; border-left: 3px solid #f0a500; margin-bottom: 10px; }
  .tl-section-title { font-size: 10px; color: var(--muted); margin: 8px 0 4px; }
  .artist-tag { display: inline-block; font-size: 11px; background: var(--soft); padding: 2px 9px; border-radius: 10px; margin: 2px; }
  .work-item { font-size: 12px; color: var(--text); padding: 4px 0; border-bottom: 1px dotted var(--border); line-height: 1.6; }
  .tl-note { font-size: 11px; color: #5a4a2e; background: var(--soft); padding: 7px 10px; border-radius: 6px; margin-top: 8px; line-height: 1.6; }
  .connector { margin-left: 13px; height: 6px; width: 1px; background: var(--border); }

  /* People / Concepts */
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
  .card-head { padding: 13px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .card-name { font-size: 14px; font-weight: bold; }
  .card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .card-badge { font-size: 10px; background: var(--soft); padding: 3px 9px; border-radius: 10px; white-space: nowrap; }
  .card-body { padding: 10px 14px 14px; border-top: 1px dotted var(--border); font-size: 13px; line-height: 1.75; color: var(--text); }

  /* Memo */
  .memo-form { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .memo-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  textarea { width: 100%; min-height: 80px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; background: var(--bg); outline: none; color: var(--dark); line-height: 1.6; }
  .btn { padding: 9px 22px; background: var(--dark); color: var(--bg); border: none; border-radius: 8px; font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 8px; }
  .memo-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; margin-bottom: 8px; }
  .memo-meta { display: flex; justify-content: space-between; margin-bottom: 7px; }
  .memo-date { font-size: 10px; color: var(--muted); }
  .memo-del { font-size: 10px; color: #c0a080; background: none; border: none; cursor: pointer; font-family: inherit; }
  .memo-text { font-size: 13px; line-height: 1.75; color: var(--text); }
  .empty { text-align: center; color: var(--muted); font-size: 12px; padding: 30px 0; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">My Art Journal</div>
  <div class="header-title">私の美術ノート</div>
</div>

<div class="search-wrap">
  <input type="search" id="searchInput" placeholder="🔍 キーワードで検索..." oninput="doSearch()">
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('timeline', this)">⏱<br>年表</button>
  <button class="tab" onclick="switchTab('people', this)">👤<br>人物</button>
  <button class="tab" onclick="switchTab('concepts', this)">💡<br>用語</button>
  <button class="tab" onclick="switchTab('memo', this)">📝<br>メモ</button>
</div>

<div class="content">
  <!-- TIMELINE -->
  <div id="tab-timeline">
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px;">タップで詳細を開く</p>
    <div id="timeline-list"></div>
  </div>

  <!-- PEOPLE -->
  <div id="tab-people" class="hidden">
    <div id="people-list"></div>
  </div>

  <!-- CONCEPTS -->
  <div id="tab-concepts" class="hidden">
    <div id="concepts-list"></div>
  </div>

  <!-- MEMO -->
  <div id="tab-memo" class="hidden">
    <div class="memo-form">
      <div class="memo-label">展示を見て気づいたこと、感想など</div>
      <textarea id="memoInput" placeholder="例：モネ展に行った。睡蓮の実物は思ったより大きかった…"></textarea>
      <button class="btn" onclick="saveMemo()">保存する</button>
    </div>
    <div id="memo-list"></div>
  </div>
</div>

<script>

let expandedId = null;
let memos = [];

// ---- RENDER ----
function renderTimeline(items) {
  const el = document.getElementById('timeline-list');
  el.innerHTML = items.map((item, i) => `
    <div class="tl-item">
      <div class="tl-bar" style="background:${item.color}"></div>
      <div style="flex:1">
        <div class="tl-card">
          <div class="tl-head" onclick="toggle('${item.id}')">
            <div>
              <span class="tl-period">${item.period}</span>
              <span class="tl-name">${item.name}</span>
              <span class="tl-en">${item.en}</span>
              <div class="tl-tags">
                ${item.keywords.map(k=>`<span class="tag" style="background:${item.color}22;color:#5a4a2e">${k}</span>`).join('')}
              </div>
            </div>
            <span class="tl-arrow" id="arr-${item.id}" style="color:${item.color}">▼</span>
          </div>
          <div id="body-${item.id}" class="tl-body hidden">
            <p class="tl-summary">${item.summary}</p>
            ${item.event ? `<div class="tl-event">📌 ${item.event}</div>` : ''}
            ${item.artists.length ? `<div class="tl-section-title">主な人物</div><div>${item.artists.map(a=>`<span class="artist-tag">${a}</span>`).join('')}</div>` : ''}
            ${item.works.length ? `<div class="tl-section-title" style="margin-top:8px">作品メモ</div>${item.works.map(w=>`<div class="work-item">🎨 ${w}</div>`).join('')}` : ''}
            ${item.note ? `<div class="tl-note">💬 ${item.note}</div>` : ''}
          </div>
        </div>
        ${i < items.length-1 ? '<div class="connector"></div>' : ''}
      </div>
    </div>
  `).join('');
}

function renderPeople(items) {
  document.getElementById('people-list').innerHTML = items.map(p => `
    <div class="card">
      <div class="card-head" onclick="toggle('p-${p.id}')">
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${p.en} / ${p.period} / ${p.country}</div>
        </div>
        <span class="card-badge">${p.movement}</span>
      </div>
      <div id="body-p-${p.id}" class="card-body hidden">${p.note}</div>
    </div>
  `).join('');
}

function renderConcepts(items) {
  document.getElementById('concepts-list').innerHTML = items.map(c => `
    <div class="card">
      <div class="card-head" onclick="toggle('c-${c.id}')">
        <div class="card-name">${c.name}</div>
        <span style="font-size:14px;color:var(--muted)">▼</span>
      </div>
      <div id="body-c-${c.id}" class="card-body hidden">${c.note}</div>
    </div>
  `).join('');
}

function renderMemos() {
  const el = document.getElementById('memo-list');
  if (!memos.length) { el.innerHTML = '<div class="empty">まだメモがありません</div>'; return; }
  el.innerHTML = [...memos].reverse().map(m => `
    <div class="memo-card">
      <div class="memo-meta">
        <span class="memo-date">${m.date}</span>
        <button class="memo-del" onclick="deleteMemo(${m.id})">削除</button>
      </div>
      <div class="memo-text">${m.text.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
}

// ---- INTERACTIONS ----
function toggle(id) {
  const body = document.getElementById('body-' + id);
  const arr = document.getElementById('arr-' + id);
  if (!body) return;
  const isOpen = !body.classList.contains('hidden');
  if (isOpen) {
    body.classList.add('hidden');
    if (arr) arr.textContent = '▼';
  } else {
    body.classList.remove('hidden');
    if (arr) arr.textContent = '▲';
  }
}

function switchTab(name, btn) {
  ['timeline','people','concepts','memo'].forEach(t => {
    document.getElementById('tab-'+t).classList.add('hidden');
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  btn.classList.add('active');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filteredTL = q ? DATA.timeline.filter(i => [i.name,i.en,...i.keywords,i.summary,...i.artists,...i.works,i.note].join(' ').toLowerCase().includes(q)) : DATA.timeline;
  const filteredP = q ? DATA.people.filter(i => [i.name,i.en,i.movement,i.country,i.note].join(' ').toLowerCase().includes(q)) : DATA.people;
  const filteredC = q ? DATA.concepts.filter(i => [i.name,i.note].join(' ').toLowerCase().includes(q)) : DATA.concepts;
  renderTimeline(filteredTL);
  renderPeople(filteredP);
  renderConcepts(filteredC);
}

function saveMemo() {
  const text = document.getElementById('memoInput').value.trim();
  if (!text) return;
  const now = new Date();
  const date = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  memos.push({ id: Date.now(), text, date });
  localStorage.setItem('art-memos', JSON.stringify(memos));
  document.getElementById('memoInput').value = '';
  renderMemos();
}

function deleteMemo(id) {
  memos = memos.filter(m => m.id !== id);
  localStorage.setItem('art-memos', JSON.stringify(memos));
  renderMemos();
}

// ---- INIT ----
try { memos = JSON.parse(localStorage.getItem('art-memos') || '[]'); } catch {}
renderTimeline(DATA.timeline);
renderPeople(DATA.people);
renderConcepts(DATA.concepts);
renderMemos();
</script>
</body>
